services:
  # Oracle Database
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-uptc
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: uptc
      APP_USER_PASSWORD: uptc123
      ORACLE_DATABASE: XEPDB1
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts/init-oracle.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "uptc/uptc123@XEPDB1", "-e", "SELECT 1 FROM DUAL"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.4
    command: start-dev --import-realm
    depends_on:
      - kafka
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-app-uptc
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    ports:
      - "7000:7000"
    environment:
      PORT: 7000
      # Oracle Database
      ORACLE_HOST: oracle
      ORACLE_PORT: 1521
      ORACLE_SID: XEPDB1
      ORACLE_USER: uptc
      ORACLE_PASSWORD: uptc123
      # Kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: node-kafka-keycloak-demo
      KAFKA_GROUP_ID: node-kafka-keycloak-consumer
      KAFKA_TOPIC: demo-events
      # Keycloak
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/node-demo
      KEYCLOAK_AUDIENCE: node-client
    volumes:
      - ./src:/app/src
      - .env:/app/.env:ro
    restart: unless-stopped

volumes:
  oracle-data:
